services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: contextcli-pgvector
    environment:
      POSTGRES_DB: contextcli
      POSTGRES_USER: contextcli
      POSTGRES_PASSWORD: contextcli
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextcli -d contextcli"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
