# ──────────────────────────────────────────────
# ContextCLI – application.properties
# ──────────────────────────────────────────────

# ── Ollama (local LLM) ──────────────────────
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.connection-timeout=5m
spring.ai.ollama.read-timeout=10m

# ── PostgreSQL / PGVector ────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/contextcli
spring.datasource.username=contextcli
spring.datasource.password=contextcli

# Auto-create the vector_store table on startup
spring.ai.vectorstore.pgvector.initialize-schema=true

# nomic-embed-text produces 768-dimensional vectors
spring.ai.vectorstore.pgvector.dimensions=768

# ── Spring Shell ─────────────────────────────
spring.shell.interactive.enabled=true
spring.main.web-application-type=none

# ── Logging ──────────────────────────────────
logging.level.root=WARN
logging.level.com.contextcli=INFO
logging.level.org.springframework.ai=INFO
